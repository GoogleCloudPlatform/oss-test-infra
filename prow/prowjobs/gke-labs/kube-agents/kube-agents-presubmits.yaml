presubmits:
  gke-labs/kube-agents:
  - name: pull-kube-agents-smoke-test
    max_concurrency: 1
    cluster: build-kube-agents
    always_run: false
    skip_report: true
    decorate: true
    decoration_config:
      timeout: 20m
    spec:
      serviceAccountName: prowjob-default-sa
      containers:
      - image: us-central1-docker.pkg.dev/kube-agents-prow/kube-agents/devops-bench-harness:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          apt-get update && apt-get install -y --no-install-recommends make gettext-base golang-go git openssl ca-certificates
          export GEMINI_API_KEY="$(cat /etc/gemini-secret/GEMINI_API_KEY)"
          trap './hack/ci-teardown.sh' EXIT
          ./hack/ci-connection-test.sh
          ./hack/ci-deploy.sh
          ./hack/ci-eval-pr.sh
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: gemini-secret
          mountPath: /etc/gemini-secret
          readOnly: true
      volumes:
      - name: gemini-secret
        secret:
          secretName: kube-agents-gemini-api-key
